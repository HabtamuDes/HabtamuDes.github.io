<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Page not found - Habtamu Assegahegn Portfolio">
  <title>404 | Page Not Found</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --bg: #1a1a1a;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.7);
      --accent: #e95420;
      --accent-hover: #ff6b35;
      --purple: #77216f;
      --border: rgba(255,255,255,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Ubuntu', system-ui, sans-serif;
      background: linear-gradient(135deg, #2c001e 0%, #5e2750 50%, #77216f 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .error-container {
      text-align: center;
      max-width: 480px;
      background: rgba(30, 30, 30, 0.9);
      padding: 3rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(233, 84, 32, 0.5);
    }
    .error-icon { font-size: 3rem; color: var(--accent); margin-bottom: 1rem; }
    .error-title { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.75rem; }
    .error-message { color: var(--text-muted); font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
    .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; font-family: inherit; font-size: 0.95rem; font-weight: 500;
      text-decoration: none; border-radius: 8px; transition: all 0.2s; cursor: pointer;
      border: 2px solid transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(233,84,32,0.4); }
    .btn-outline { color: var(--text); border-color: var(--border); background: transparent; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .terminal-prompt {
      color: #73d216; font-family: 'Ubuntu Mono', monospace; font-size: 0.85rem;
      margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
    }
    @media (max-width: 480px) {
      .error-code { font-size: 4rem; }
      .error-container { padding: 2rem; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon"><i class="fa-solid fa-terminal"></i></div>
    <div class="error-code">404</div>
    <h1 class="error-title">Command Not Found</h1>
    <p class="error-message">The page you're looking for doesn't exist or has been moved to another directory.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary"><i class="fa-solid fa-home"></i> Go Home</a>
      <a href="javascript:history.back()" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
    </div>
    <div class="terminal-prompt">habtamu@ubuntu:~$ <span style="color:#e95420">404</span> -- command not found</div>
  </div>
</body>
</html>
